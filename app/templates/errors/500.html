<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>500 — Terjadi Kesalahan | LBB Super Smart</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
  <style>
    body { background: #f3f4f6; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
    .error-card { background: #fff; border-radius: 1.2rem; box-shadow: 0 4px 32px rgba(0,0,0,.08); max-width: 520px; width: 100%; padding: 3rem 2.5rem; text-align: center; }
    .error-icon { font-size: 5rem; color: #ef4444; margin-bottom: 1.25rem; }
    .error-code { font-size: 4.5rem; font-weight: 800; color: #1a1f36; line-height: 1; }
    .error-title { font-size: 1.4rem; font-weight: 700; color: #374151; margin: .5rem 0 .75rem; }
    .error-msg { color: #6b7280; font-size: .93rem; margin-bottom: 2rem; }
    .error-detail { background: #fef2f2; border: 1px solid #fecaca; border-radius: .6rem; padding: .75rem 1rem; font-family: monospace; font-size: .8rem; color: #b91c1c; text-align: left; word-break: break-word; margin-bottom: 2rem; }
  </style>
</head>
<body>
  <div class="error-card">
    <div class="error-icon"><i class="bi bi-exclamation-triangle-fill"></i></div>
    <div class="error-code">500</div>
    <div class="error-title">Terjadi Kesalahan pada Server</div>
    <p class="error-msg">
      Maaf, terjadi kesalahan internal. Tim kami telah diberitahu.<br>
      Silakan coba lagi dalam beberapa saat.
    </p>
    {% if error %}
    <div class="error-detail">{{ error }}</div>
    {% endif %}
    <div class="d-flex gap-2 justify-content-center flex-wrap">
      <a href="javascript:history.back()" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-1"></i>Kembali
      </a>
      <a href="/dashboard/" class="btn btn-primary">
        <i class="bi bi-house me-1"></i>Dashboard
      </a>
    </div>
  </div>
</body>
</html>
