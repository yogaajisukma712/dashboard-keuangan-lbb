{% extends "base_auth.html" %}

{% block title %}Recruitment Tutor{% endblock %}

{% block body %}
<main class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-7 col-lg-5">
      <div class="card border-0 shadow-lg">
        <div class="card-body p-4 p-md-5">
          <h1 class="h4 fw-bold mb-2">Recruitment Tutor</h1>
          <p class="text-muted small mb-4">Masuk dengan akun Google/Gmail aktif untuk melanjutkan pendaftaran.</p>
          <form method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <label class="form-label fw-semibold">Email Google/Gmail</label>
            <input class="form-control form-control-lg" type="email" name="google_email" placeholder="nama@gmail.com" required>
            <button class="btn btn-primary btn-lg w-100 mt-4" type="submit">
              <i class="bi bi-google me-2"></i>Login dengan Google
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</main>
{% endblock %}
