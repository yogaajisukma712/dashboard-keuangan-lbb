{% extends "tutor_portal/base.html" %}

{% block title %}Login Tutor{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <img src="{{ branding_logo_mark_data_uri or '' }}" alt="Logo Super Smart" style="width:72px;height:72px;object-fit:contain">
          <h4 class="fw-bold mt-3 mb-1">Dashboard Tutor</h4>
          <p class="text-muted small mb-0">Masuk dengan Gmail tutor yang terdaftar.</p>
        </div>
        <form method="post" novalidate>
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <label class="form-label fw-semibold" for="email">Gmail Tutor</label>
          <input class="form-control form-control-lg" id="email" name="email" type="email" placeholder="nama@gmail.com" required>
          <button class="btn btn-primary w-100 mt-3" type="submit">
            <i class="bi bi-envelope-check me-1"></i>Kirim Link Verifikasi
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
