{% extends "tutor_portal/base.html" %}

{% block title %}Cek Gmail{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4 text-center">
        <i class="bi bi-envelope-paper-heart text-primary display-5"></i>
        <h4 class="fw-bold mt-3">Cek Gmail</h4>
        <p class="text-muted mb-0">
          Link verifikasi untuk {{ tutor.name }} sudah diproses. Buka Gmail tutor dan klik link masuk.
        </p>
        <a href="{{ url_for('tutor_portal.login') }}" class="btn btn-outline-primary mt-4">Kirim ulang</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
