services:
  db:
    image: postgres:16-alpine
    container_name: billing_supersmart_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lbb_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - billing_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-lbb_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - billing_net

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: billing_supersmart_web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      FLASK_ENV: ${FLASK_ENV:-production}
      FLASK_APP: ${FLASK_APP:-run.py}
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: 5000
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-billing}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-lbb_db}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PAGINATION_PER_PAGE: ${PAGINATION_PER_PAGE:-20}
      PYTHONUNBUFFERED: "1"
      WHATSAPP_BOT_INTERNAL_URL: ${WHATSAPP_BOT_INTERNAL_URL:-http://whatsapp_bot:3000}
      WHATSAPP_BOT_TOKEN: ${WHATSAPP_BOT_TOKEN:-change-this-whatsapp-bot-token}
      WHATSAPP_EXCLUDED_GROUP_NAMES: ${WHATSAPP_EXCLUDED_GROUP_NAMES:-VPS / RDP MURAH III}
      APP_BASE_URL: ${APP_BASE_URL:-https://billing.supersmart.click}
      MAIN_APP_HOSTS: ${MAIN_APP_HOSTS:-billing.supersmart.click,app.supersmart.click}
      TUTOR_PORTAL_BASE_URL: ${TUTOR_PORTAL_BASE_URL:-https://tutor.supersmart.click}
      TUTOR_PORTAL_HOST: ${TUTOR_PORTAL_HOST:-tutor.supersmart.click}
      INSTITUTION_NAME: ${INSTITUTION_NAME:-LBB Super Smart}
      INSTITUTION_TAGLINE: ${INSTITUTION_TAGLINE:-BEING SMART FOR FUTURE}
      INSTITUTION_PHONE: ${INSTITUTION_PHONE:-0895-6359-07419}
      INSTITUTION_EMAIL: ${INSTITUTION_EMAIL:-lbbsupersmart@gmail.com}
      INSTITUTION_ADDRESS: ${INSTITUTION_ADDRESS:-Jl. Menur Pumpungan No 63, Sukolilo}
      INSTITUTION_CITY: ${INSTITUTION_CITY:-Surabaya}
      INSTITUTION_CEO_NAME: ${INSTITUTION_CEO_NAME:-Yoga Aji Sukma, S.Mat., M.Stat.}
      INSTITUTION_CEO_TITLE: ${INSTITUTION_CEO_TITLE:-CEO}
      INSTITUTION_BANK_ACCOUNTS: ${INSTITUTION_BANK_ACCOUNTS:-BCA (Yoga Aji Sukma) - 5200540672|BNI (Yoga Aji Sukma) - 0809530111|BRI (Yoga Aji Sukma) - 185901010065501|Permata (Yoga Aji Sukma) - 4129843662|BSI (Yoga Aji Sukma) - 7311274753|Bank Jago (Yoga Aji Sukma) - 105576621785|SeaBank (Yoga Aji Sukma) - 901687553404}
    ports:
      - "6001:5000"
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    networks:
      - billing_net

  tutor_web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: billing_supersmart_tutor_web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      FLASK_ENV: ${FLASK_ENV:-production}
      FLASK_APP: ${FLASK_APP:-run.py}
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: 5000
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-billing}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-lbb_db}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PAGINATION_PER_PAGE: ${PAGINATION_PER_PAGE:-20}
      PYTHONUNBUFFERED: "1"
      APP_BASE_URL: ${APP_BASE_URL:-https://billing.supersmart.click}
      MAIN_APP_HOSTS: ${MAIN_APP_HOSTS:-billing.supersmart.click,app.supersmart.click}
      TUTOR_PORTAL_BASE_URL: ${TUTOR_PORTAL_BASE_URL:-https://tutor.supersmart.click}
      TUTOR_PORTAL_HOST: ${TUTOR_PORTAL_HOST:-tutor.supersmart.click}
      TUTOR_PORTAL_MIN_DATE: ${TUTOR_PORTAL_MIN_DATE:-2026-04-01}
      MAIL_SERVER: ${MAIL_SERVER:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_USE_TLS: ${MAIL_USE_TLS:-true}
      MAIL_USE_SSL: ${MAIL_USE_SSL:-false}
      MAIL_DEFAULT_SENDER: ${MAIL_DEFAULT_SENDER:-no-reply@supersmart.click}
    ports:
      - "${TUTOR_PORTAL_PORT:-6003}:5000"
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    networks:
      - billing_net

  whatsapp_bot:
    build:
      context: ./whatsapp-bot
      dockerfile: Dockerfile
    container_name: billing_supersmart_whatsapp_bot
    init: true
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      web:
        condition: service_started
    environment:
      WHATSAPP_BOT_PORT: 3000
      WHATSAPP_FLASK_BASE_URL: http://web:5000
      WHATSAPP_BOT_TOKEN: ${WHATSAPP_BOT_TOKEN:-change-this-whatsapp-bot-token}
      WHATSAPP_EXCLUDED_GROUP_NAMES: ${WHATSAPP_EXCLUDED_GROUP_NAMES:-VPS / RDP MURAH III}
      WWEBJS_DATA_PATH: /app/.wwebjs_auth
      WWEBJS_BACKUP_PATH: /app/.wwebjs_backups
      WWEBJS_CLIENT_ID: ${WWEBJS_CLIENT_ID:-billing-supersmart}
      WHATSAPP_SYNC_MESSAGE_LIMIT: ${WHATSAPP_SYNC_MESSAGE_LIMIT:-500}
      WHATSAPP_AUTO_START: ${WHATSAPP_AUTO_START:-true}
      WHATSAPP_AUTO_SYNC_ENABLED: ${WHATSAPP_AUTO_SYNC_ENABLED:-true}
      WHATSAPP_AUTO_SYNC_FULL_SYNC: ${WHATSAPP_AUTO_SYNC_FULL_SYNC:-true}
      WHATSAPP_AUTO_SYNC_INTERVAL_MS: ${WHATSAPP_AUTO_SYNC_INTERVAL_MS:-21600000}
      WHATSAPP_WATCHDOG_INTERVAL_MS: ${WHATSAPP_WATCHDOG_INTERVAL_MS:-60000}
      WHATSAPP_RECONNECT_DELAY_MS: ${WHATSAPP_RECONNECT_DELAY_MS:-15000}
      WHATSAPP_READY_TIMEOUT_MS: ${WHATSAPP_READY_TIMEOUT_MS:-120000}
      PUPPETEER_PROTOCOL_TIMEOUT_MS: ${PUPPETEER_PROTOCOL_TIMEOUT_MS:-180000}
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
    shm_size: "1gb"
    ports:
      - "6002:3000"
    volumes:
      - whatsapp_bot_auth:/app/.wwebjs_auth
      - whatsapp_bot_backups:/app/.wwebjs_backups
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    networks:
      - billing_net

networks:
  billing_net:
    driver: bridge

volumes:
  billing_postgres_data:
  whatsapp_bot_auth:
  whatsapp_bot_backups:
